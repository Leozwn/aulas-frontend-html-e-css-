<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre o uso de titulos</title>
</head>
<body>
        <!-- COMENTÁRIO/ANOTAÇÃO de HTML (ctrl+;) -->
        <!-- A utilização de tags de títulos (heading)
        segue uma lógica de hierarquia. Exemplo: pare ter um <h3>,
        necessariamente devemos ter antes um <h2> e um <h1>.
        obs: vai de <h1> até <h6> -->
     
        <h1>Leonardo Oliveira</h1>
        <h2>Dados pessoais </h2>

        <h2>Experiências</h2>
            <h3>Empresa A</h3>
            <h3>Empresa B</h3>
        
        <h2>Formação</h2>
            <h3>Escola x</h3>
            <h3>Escola y</h3>

        <h2>Informações Adicionais</h2>

 
</body>
</html>
