<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletores modernos</title>
    <style>
          *, *::before, *::after {box-sizing: border-box; }

          :root {
            --cor-borda: rgb(255, 188, 5);
            --cor-destaque:rgb(255, 252, 252);
          }

          body {
            font-family: sans-serif;
            padding: 2rem;
            background-color: rgb(129, 129, 129);
          }

          article {
            background-color: rgb(247, 214, 175);
            border: solid 3px var(--cor-borda);
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 400px;
            margin-inline: auto;
            margin-block: 2rem;
        }
            
        img {max-width: 100%;}

        a {
            text-decoration: none;
            background-color: var(--cor-destaque);
            color: rgb(28, 120, 207);
            padding: 0.5rem;
        }

        /* Agrupamos dentro do contexto do article usando pseudo-classe :is() e formatamos os elementos ali contidos.  */
        article :is(h2,  p, span) {color: blue; }


        /* Usamos o :has() para, através de um condição baseada no filho, conseguir formatar o pai */
        article:has(img){
            border-color: darkblue;
            background-color: cyan;
        }

        /* Aplica sombra no article desde que passe o mouse no link dentro dele. */
        article:has(a:hover){
            box-shadow:gold 0 0 30px;
        }


    </style>
</head>
<body>
    <h1>Usando seletores <code>:is</code> e <code>:has</code></h1>
    <article>
        <h2>Exemplo 1: artigo com texto</h2>
        <p>Aqui temos um texto qualquer</p>
        <span>Aqui outro texto...</span>
    </article>

    <article>
        <img src="imagens/front-end.jpg" alt="">
        <h2>Exemplo 2: artigo com imagem</h2>
        <p>Aqui temos imagem e texto...</p>
    </article>

    <article>
        <h2>Exemplo 3: texto com link</h2>
        <p>texto qualquer</p>
        <a href="">Link qualquer</a>
    </article>

    <hr>

    <h2>Outro título...</h2>
    <p>Outro texto...</p>
    <span>Outro texto do span...</span>
</body>
</html>
