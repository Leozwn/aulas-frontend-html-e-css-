<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox Itens</title>
    <style>
       
       *, *::before, *::after { box-sizing: border-box;
        margin: 0;
        padding: 0; 
    }
        
    body {
        font-family: cursive;
        background-color:darkred;
        padding: 1rem;
        color: rgb(0, 0, 0);
    }

    h1 {
        font-size: 1.2rem;
        margin-block-end: 0.8rem;
        color: white;
    }
   
    /* Flex Container */
    .container {
        background-color: white;
        border-radius: 8px;
        padding: 10px;
        display: flex;
        gap: 15px;
        flex-wrap: nowrap;
        margin-block: 10px;
    }

    /* Flex Itens */
    .item {
        background-color: orangered;
        padding: 20px;
        text-align: center;

        /* Tamanho ideal para o flex */
        flex-basis: 150px;

        /* definindo se o item cresce */
        flex-grow: 1;

        /* Definindo se o item encolhe */
        flex-shrink: 1;

        /* Forma abreviada(grow, shring, basis) */
        /* flex: 1 1 150px; */
    }

    .d {
        background-color: yellow;
        /* Aumenta a caixinha */
        flex-grow: 3;
    }

    .e {
        background-color:green;
        /* Encolhe mais a caixinha */
        flex-shrink: 2;
    }

    .f {
        background: red;
        flex-grow: 0;
        flex-shrink: 0;
    }

    .g {
        background-color: rgb(126, 126, 126);
        order: 3;
    }

    .h {
        background-color: rgb(0, 0, 0);
        order: 1;
        color: white;
        align-self: center;
    }
        
    .i{
        background-color: fuchsia;
        order: 2;
        align-self: flex-end;
    }

    .alinhamentos {
        height: 200px;
        align-items: flex-start;
    }
   </style>
</head>
<body>
    <h1>Conhecendo e experimentando propriedades flex para os itens de um container</h1>
    <div class="container">
        <div class="item a">Item A</div>
        <div class="item b">Item B</div>
        <div class="item c">Item C</div>
    </div>
    
    <div class="container">
        <div class="item d">Item D</div>
        <div class="item e">Item E</div>
        <div class="item f">Item F</div>
    </div>


    <div class="container alinhamentos">
        <div class="item g">Item G</div>
        <div class="item h">Item H</div>
        <div class="item i">Item I</div>
    </div>
</body>
</html>
