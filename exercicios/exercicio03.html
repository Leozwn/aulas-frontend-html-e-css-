    <h3>1. Neblina</h3>
    
    <figure>
        <img src="../imagens/paisagem1.jpg" alt="Floresta de coníferas na serra envolta por neblina, tons frios e atmosfera serena." width="650" height="400">

    </figure>

    <h3>2. Furacão</h3>

        </figcaption>
    </figure>
