<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube Esportivo Vermelho Leste</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        h1,
        h2,
        p {
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
            font-size: 18px;
        }

        nav {
            background: linear-gradient(90deg, #410500 0.000%, #5c0000 16.667%, #7b0000 33.333%, #9d0000 50.000%, #bf0900 66.667%, #df1a00 83.333%, #fa3200 100.000%);
            padding: 6vw;
            display: flex;
            justify-content: space-between;


            a {
                color: rgb(255, 251, 251);
                font-weight: bolder;
                font-family: system-ui, 'Segoe UI', sans-serif;
            }
        }

        nav a:hover, a:focus {
            color: rgb(0, 0, 0);
        }




       
    </style>
</head>

<body>
    <header>
        <nav>
            <div>
                <img src="" alt="LOGO">
            </div>
            <a href="">Link</a>
            <a href="">Link</a>
            <a href="">Link</a>
            <a href="">Link</a>
        </nav>
    </header>
</body>

</html>
